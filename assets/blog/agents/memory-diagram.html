<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d1117; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; font-family: monospace; }
svg { max-width: 850px; width: 100%; height: auto; }
</style></head><body>
<svg viewBox="0 0 800 150" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="150" fill="transparent"/>

  <!-- Agent workspace zone -->
  <rect x="20" y="10" width="760" height="120" rx="10" fill="none" stroke="#484f58" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="40" y="32" fill="#484f58" font-family="monospace" font-size="11">~/.openclaw/workspace/</text>

  <!-- Agent loop -->
  <rect x="40" y="45" width="160" height="70" rx="8" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="55" y="62" fill="#8b5cf6" font-family="monospace" font-size="9">Agent Loop</text>
  <rect x="52" y="70" width="135" height="35" rx="5" fill="#1c2128" stroke="#8b5cf6" stroke-width="1"/>
  <text x="119" y="92" text-anchor="middle" fill="#d0bfff" font-family="monospace" font-size="10">LLM + Tools + Skills</text>

  <!-- Arrow: agent writes to memory -->
  <line x1="200" y1="80" x2="260" y2="80" stroke="#f59e0b" stroke-width="2" marker-end="url(#ao)"/>
  <text x="230" y="72" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="8">writes</text>

  <!-- Memory files -->
  <rect x="260" y="40" width="260" height="80" rx="8" fill="#0d1a0d" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="275" y="58" fill="#f59e0b" font-family="monospace" font-size="10" font-weight="bold">memory/</text>

  <rect x="275" y="65" width="230" height="20" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="285" y="79" fill="#56d4dd" font-family="monospace" font-size="9">MEMORY.md</text>
  <text x="420" y="79" fill="#484f58" font-family="monospace" font-size="8">long-term facts</text>

  <rect x="275" y="90" width="230" height="20" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="285" y="104" fill="#56d4dd" font-family="monospace" font-size="9">2026-03-25.md</text>
  <text x="430" y="104" fill="#484f58" font-family="monospace" font-size="8">daily log</text>

  <!-- Arrow: reads on next session -->
  <rect x="560" y="50" width="180" height="60" rx="8" fill="#1c2128" stroke="#22c55e" stroke-width="1.5"/>
  <text x="650" y="70" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="9">Next session reads:</text>
  <text x="650" y="86" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="8">MEMORY.md (always)</text>
  <text x="650" y="100" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="8">today + yesterday logs</text>

  <line x1="520" y1="80" x2="560" y2="80" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#ag)"/>


  <defs>
    <marker id="ao" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#22c55e"/></marker>
  </defs>
</svg>
</body></html>
