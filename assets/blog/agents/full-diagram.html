<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How an Agent Works</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  svg { max-width: 900px; width: 100%; height: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 850 580" xmlns="http://www.w3.org/2000/svg">
  <rect width="850" height="580" fill="transparent"/>

  <!-- === TOP: User → Gateway (centered) === -->
  <rect x="365" y="10" width="80" height="40" rx="8" fill="#1c2128" stroke="#4a9eed" stroke-width="2"/>
  <text x="405" y="35" text-anchor="middle" fill="#4a9eed" font-family="monospace" font-size="14">User</text>

  <line x1="405" y1="50" x2="405" y2="75" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="335" y="75" width="140" height="45" rx="8" fill="#1c2128" stroke="#22c55e" stroke-width="2"/>
  <text x="405" y="95" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="13" font-weight="bold">Gateway</text>
  <text x="405" y="110" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">WhatsApp, Slack, Discord...</text>

  <!-- Arrow: Gateway → Agent Loop -->
  <line x1="405" y1="120" x2="405" y2="160" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- === AGENT LOOP ZONE (covers everything including conv history + memory) === -->
  <rect x="40" y="155" width="770" height="400" rx="12" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.35"/>
  <text x="60" y="175" fill="#8b5cf6" font-family="monospace" font-size="12">Agent Loop (while True)</text>

  <!-- LLM box -->
  <rect x="60" y="210" width="120" height="65" rx="10" fill="#1c2128" stroke="#8b5cf6" stroke-width="2"/>
  <text x="120" y="240" text-anchor="middle" fill="#d0bfff" font-family="monospace" font-size="18" font-weight="bold">LLM</text>
  <text x="120" y="260" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="10">(The Brain)</text>

  <!-- Arrow: LLM → diamond -->
  <line x1="180" y1="243" x2="230" y2="243" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Diamond: stop_reason? -->
  <polygon points="295,213 360,243 295,273 230,243" fill="#1c2128" stroke="#f59e0b" stroke-width="2"/>
  <text x="295" y="247" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="10">stop_reason?</text>

  <!-- Arrow: diamond → Done (down) -->
  <line x1="295" y1="273" x2="295" y2="350" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="310" y="315" fill="#ef4444" font-family="monospace" font-size="10">end_turn</text>

  <!-- Done box -->
  <rect x="245" y="355" width="100" height="35" rx="8" fill="#1c2128" stroke="#ef4444" stroke-width="2"/>
  <text x="295" y="377" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="14" font-weight="bold">Done!</text>

  <!-- Arrow: diamond → dispatch (right) -->
  <line x1="360" y1="243" x2="420" y2="243" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="390" y="233" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">tool_use</text>

  <!-- Dispatch Map zone -->
  <rect x="420" y="190" width="160" height="120" rx="8" fill="#161b22" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
  <text x="500" y="210" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="11">Dispatch Map</text>

  <!-- run_bash -->
  <rect x="435" y="218" width="130" height="24" rx="6" fill="#0d2818" stroke="#22c55e" stroke-width="1"/>
  <text x="500" y="235" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="11">run_bash</text>

  <!-- ... -->
  <text x="500" y="257" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="13">...</text>

  <!-- load_skill -->
  <rect x="435" y="267" width="130" height="24" rx="6" fill="#0d2830" stroke="#06b6d4" stroke-width="1"/>
  <text x="500" y="284" text-anchor="middle" fill="#56d4dd" font-family="monospace" font-size="11">load_skill</text>

  <!-- Arrow: load_skill → skills -->
  <line x1="565" y1="279" x2="620" y2="279" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowCyan)"/>

  <!-- Skills shelf -->
  <rect x="620" y="190" width="120" height="120" rx="8" fill="#0d2830" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
  <text x="680" y="210" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="11">skills/</text>

  <rect x="632" y="218" width="96" height="20" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="680" y="232" text-anchor="middle" fill="#56d4dd" font-family="monospace" font-size="9">conventions.md</text>

  <rect x="632" y="243" width="96" height="20" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="680" y="257" text-anchor="middle" fill="#56d4dd" font-family="monospace" font-size="9">github.md</text>

  <rect x="632" y="268" width="96" height="20" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="680" y="282" text-anchor="middle" fill="#56d4dd" font-family="monospace" font-size="9">browser.md</text>

  <!-- Arrow: dispatch → tool result (down) -->
  <line x1="500" y1="310" x2="500" y2="350" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Tool result box -->
  <rect x="440" y="350" width="120" height="30" rx="6" fill="#0d2818" stroke="#22c55e" stroke-width="1.5"/>
  <text x="500" y="370" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="11">tool result</text>

  <!-- Arrow: tool result → conversation history -->
  <path d="M 500 380 L 500 450 L 460 450" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Conversation History box -->
  <rect x="200" y="435" width="260" height="35" rx="8" fill="#1c2128" stroke="#8b5cf6" stroke-width="2"/>
  <text x="330" y="457" text-anchor="middle" fill="#d0bfff" font-family="monospace" font-size="11">Conversation History</text>

  <!-- Arrow: conversation history back to LLM -->
  <path d="M 200 452 L 120 452 L 120 275" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>

  <!-- Memory box -->
  <rect x="260" y="495" width="140" height="35" rx="8" fill="#1c2128" stroke="#f59e0b" stroke-width="2"/>
  <text x="330" y="517" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="12">Memory</text>

  <!-- Arrow: memory ↔ conversation history -->
  <line x1="330" y1="470" x2="330" y2="495" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="430" y="515" fill="#f59e0b" font-family="monospace" font-size="8">persists across sessions</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a9eed"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#06b6d4"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
  </defs>
</svg>
</body>
</html>
