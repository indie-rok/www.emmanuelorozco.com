<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Everything So Far</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  svg { max-width: 900px; width: 100%; height: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 800 430" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="430" fill="transparent"/>

  <!-- User (centered top) -->
  <rect x="340" y="10" width="80" height="40" rx="8" fill="#1c2128" stroke="#4a9eed" stroke-width="2"/>
  <text x="380" y="35" text-anchor="middle" fill="#4a9eed" font-family="monospace" font-size="14">User</text>

  <!-- Arrow: User → LLM -->
  <line x1="380" y1="50" x2="380" y2="80" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <text x="395" y="70" fill="#4a9eed" font-family="monospace" font-size="10">prompt</text>

  <!-- Agent Loop zone -->
  <rect x="40" y="80" width="720" height="330" rx="12" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.35"/>
  <text x="60" y="100" fill="#8b5cf6" font-family="monospace" font-size="12">Agent Loop (while True)</text>

  <!-- LLM box -->
  <rect x="60" y="130" width="120" height="65" rx="10" fill="#1c2128" stroke="#8b5cf6" stroke-width="2"/>
  <text x="120" y="160" text-anchor="middle" fill="#d0bfff" font-family="monospace" font-size="18" font-weight="bold">LLM</text>
  <text x="120" y="180" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="10">(The Brain)</text>

  <!-- Arrow: LLM → diamond -->
  <line x1="180" y1="163" x2="230" y2="163" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Diamond: stop_reason? -->
  <polygon points="295,133 360,163 295,193 230,163" fill="#1c2128" stroke="#f59e0b" stroke-width="2"/>
  <text x="295" y="167" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="10">stop_reason?</text>

  <!-- Arrow: diamond → Done (down) -->
  <line x1="295" y1="193" x2="295" y2="270" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowRed)"/>
  <text x="310" y="235" fill="#ef4444" font-family="monospace" font-size="10">end_turn</text>

  <!-- Done box -->
  <rect x="245" y="275" width="100" height="35" rx="8" fill="#1c2128" stroke="#ef4444" stroke-width="2"/>
  <text x="295" y="297" text-anchor="middle" fill="#ef4444" font-family="monospace" font-size="14" font-weight="bold">Done!</text>

  <!-- Arrow: diamond → dispatch (right) -->
  <line x1="360" y1="163" x2="410" y2="163" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="385" y="153" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="10">tool_use</text>

  <!-- Dispatch Map zone -->
  <rect x="410" y="110" width="160" height="120" rx="8" fill="#161b22" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>
  <text x="490" y="130" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="11">Dispatch Map</text>

  <!-- run_bash -->
  <rect x="425" y="138" width="130" height="24" rx="6" fill="#0d2818" stroke="#22c55e" stroke-width="1"/>
  <text x="490" y="155" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="11">run_bash</text>

  <!-- ... -->
  <text x="490" y="177" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="13">...</text>

  <!-- load_skill -->
  <rect x="425" y="187" width="130" height="24" rx="6" fill="#0d2830" stroke="#06b6d4" stroke-width="1"/>
  <text x="490" y="204" text-anchor="middle" fill="#56d4dd" font-family="monospace" font-size="11">load_skill</text>

  <!-- Arrow: load_skill → skills -->
  <line x1="555" y1="199" x2="600" y2="199" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowCyan)"/>

  <!-- Skills shelf -->
  <rect x="600" y="110" width="120" height="120" rx="8" fill="#0d2830" stroke="#06b6d4" stroke-width="1" opacity="0.7"/>
  <text x="660" y="130" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="11">skills/</text>

  <rect x="612" y="138" width="96" height="20" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="660" y="152" text-anchor="middle" fill="#56d4dd" font-family="monospace" font-size="9">conventions.md</text>

  <rect x="612" y="163" width="96" height="20" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="660" y="177" text-anchor="middle" fill="#56d4dd" font-family="monospace" font-size="9">github.md</text>

  <rect x="612" y="188" width="96" height="20" rx="4" fill="#1c2128" stroke="#30363d" stroke-width="1"/>
  <text x="660" y="202" text-anchor="middle" fill="#56d4dd" font-family="monospace" font-size="9">browser.md</text>

  <!-- Arrow: dispatch → tool result (down) -->
  <line x1="490" y1="230" x2="490" y2="270" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- Tool result box -->
  <rect x="430" y="270" width="120" height="30" rx="6" fill="#0d2818" stroke="#22c55e" stroke-width="1.5"/>
  <text x="490" y="290" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="11">tool result</text>

  <!-- Arrow: tool result → conversation history -->
  <path d="M 490 300 L 490 365 L 440 365" fill="none" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- Conversation History box -->
  <rect x="180" y="350" width="260" height="35" rx="8" fill="#1c2128" stroke="#8b5cf6" stroke-width="2"/>
  <text x="310" y="372" text-anchor="middle" fill="#d0bfff" font-family="monospace" font-size="11">Conversation History</text>

  <!-- Arrow: conversation history back to LLM -->
  <path d="M 180 367 L 120 367 L 120 195" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowPurple)"/>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a9eed"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#ef4444"/>
    </marker>
    <marker id="arrowCyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#06b6d4"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
  </defs>
</svg>
</body>
</html>
