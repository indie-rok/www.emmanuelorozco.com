<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gateway Routing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
  svg { max-width: 850px; width: 100%; height: auto; }
</style>
</head>
<body>
<svg viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="820" height="400" fill="transparent"/>

  <!-- User -->
  <rect x="20" y="165" width="80" height="45" rx="8" fill="#1c2128" stroke="#4a9eed" stroke-width="2"/>
  <text x="60" y="192" text-anchor="middle" fill="#4a9eed" font-family="monospace" font-size="14">User</text>

  <!-- Arrow: User → Channel -->
  <line x1="100" y1="188" x2="135" y2="188" stroke="#4a9eed" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Channel (WhatsApp) -->
  <rect x="135" y="165" width="95" height="45" rx="8" fill="#0d2818" stroke="#22c55e" stroke-width="2"/>
  <text x="182" y="184" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="11" font-weight="bold">WhatsApp</text>
  <text x="182" y="200" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="8">"fix the bug"</text>

  <!-- Other channels -->
  <rect x="145" y="75" width="80" height="25" rx="5" fill="#0d2830" stroke="#06b6d4" stroke-width="1"/>
  <text x="185" y="92" text-anchor="middle" fill="#06b6d4" font-family="monospace" font-size="9">Telegram</text>

  <rect x="145" y="115" width="80" height="25" rx="5" fill="#1c2128" stroke="#8b5cf6" stroke-width="1"/>
  <text x="185" y="132" text-anchor="middle" fill="#8b5cf6" font-family="monospace" font-size="9">Slack</text>

  <rect x="145" y="280" width="80" height="25" rx="5" fill="#1c2128" stroke="#ec4899" stroke-width="1"/>
  <text x="185" y="297" text-anchor="middle" fill="#ec4899" font-family="monospace" font-size="9">Discord</text>

  <rect x="145" y="320" width="80" height="25" rx="5" fill="#1c2128" stroke="#f59e0b" stroke-width="1"/>
  <text x="185" y="337" text-anchor="middle" fill="#f59e0b" font-family="monospace" font-size="9">iMessage</text>

  <!-- Arrows: channels → gateway -->
  <line x1="225" y1="88" x2="300" y2="130" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="225" y1="128" x2="300" y2="155" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="230" y1="188" x2="300" y2="188" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="225" y1="292" x2="300" y2="230" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,3"/>
  <line x1="225" y1="332" x2="300" y2="250" stroke="#30363d" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Gateway box -->
  <rect x="300" y="80" width="130" height="220" rx="10" fill="#1c2128" stroke="#22c55e" stroke-width="2"/>
  <text x="365" y="108" text-anchor="middle" fill="#22c55e" font-family="monospace" font-size="14" font-weight="bold">Gateway</text>
  <text x="365" y="125" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">WebSocket</text>
  <line x1="320" y1="140" x2="410" y2="140" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="365" y="165" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">routes to</text>
  <text x="365" y="180" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">correct</text>
  <text x="365" y="195" text-anchor="middle" fill="#484f58" font-family="monospace" font-size="9">agent</text>

  <!-- Arrows: gateway → agents -->
  <line x1="430" y1="130" x2="490" y2="85" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <line x1="430" y1="190" x2="490" y2="180" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="430" y1="250" x2="490" y2="280" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <!-- Agent Loop 1 (coding) -->
  <rect x="490" y="30" width="200" height="110" rx="8" fill="none" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="510" y="48" fill="#8b5cf6" font-family="monospace" font-size="9">Agent: Coding</text>
  <rect x="508" y="58" width="80" height="28" rx="5" fill="#1c2128" stroke="#8b5cf6" stroke-width="1"/>
  <text x="548" y="76" text-anchor="middle" fill="#d0bfff" font-family="monospace" font-size="10">LLM</text>
  <rect x="508" y="92" width="80" height="22" rx="5" fill="#0d2818" stroke="#22c55e" stroke-width="1"/>
  <text x="548" y="107" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="9">Tools</text>
  <rect x="600" y="58" width="75" height="22" rx="5" fill="#0d2830" stroke="#06b6d4" stroke-width="1"/>
  <text x="637" y="73" text-anchor="middle" fill="#56d4dd" font-family="monospace" font-size="9">Skills</text>

  <!-- Agent Loop 2 (marketing) - highlighted as active -->
  <rect x="490" y="150" width="200" height="110" rx="8" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.8"/>
  <text x="510" y="168" fill="#22c55e" font-family="monospace" font-size="9">Agent: Marketing</text>
  <rect x="508" y="178" width="80" height="28" rx="5" fill="#1c2128" stroke="#8b5cf6" stroke-width="1"/>
  <text x="548" y="196" text-anchor="middle" fill="#d0bfff" font-family="monospace" font-size="10">LLM</text>
  <rect x="508" y="212" width="80" height="22" rx="5" fill="#0d2818" stroke="#22c55e" stroke-width="1"/>
  <text x="548" y="227" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="9">Tools</text>
  <rect x="600" y="178" width="75" height="22" rx="5" fill="#0d2830" stroke="#06b6d4" stroke-width="1"/>
  <text x="637" y="193" text-anchor="middle" fill="#56d4dd" font-family="monospace" font-size="9">Skills</text>

  <!-- Agent Loop 3 (support) -->
  <rect x="490" y="270" width="200" height="110" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <text x="510" y="288" fill="#f59e0b" font-family="monospace" font-size="9">Agent: Support</text>
  <rect x="508" y="298" width="80" height="28" rx="5" fill="#1c2128" stroke="#8b5cf6" stroke-width="1"/>
  <text x="548" y="316" text-anchor="middle" fill="#d0bfff" font-family="monospace" font-size="10">LLM</text>
  <rect x="508" y="332" width="80" height="22" rx="5" fill="#0d2818" stroke="#22c55e" stroke-width="1"/>
  <text x="548" y="347" text-anchor="middle" fill="#7ee787" font-family="monospace" font-size="9">Tools</text>
  <rect x="600" y="298" width="75" height="22" rx="5" fill="#0d2830" stroke="#06b6d4" stroke-width="1"/>
  <text x="637" y="313" text-anchor="middle" fill="#56d4dd" font-family="monospace" font-size="9">Skills</text>

  <!-- Active indicator -->
  <text x="700" y="210" fill="#22c55e" font-family="monospace" font-size="9">&larr; active</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a9eed"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#22c55e"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
</body>
</html>
